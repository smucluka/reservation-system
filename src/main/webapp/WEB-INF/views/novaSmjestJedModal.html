<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" 
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<div th:fragment="novaSmjestJedModal">
 
 	<!-- Button trigger modal -->
	<button type="button" class="dodajKlasa btn btn-primary" data-toggle="modal" data-target="#dodajSmjestJedModal">
	  Dodaj smještajnu jedinicu
	</button>
	
	<!-- Modal -->
	<div class="modal fade" id="dodajSmjestJedModal" tabindex="-1" role="dialog" aria-labelledby="novaSmjestJedLabel" aria-hidden="true">
	  <div class="modal-dialog" role="document">
	    <div class="modal-content">
	      <div class="modal-header">
	        <h5 class="modal-title" id="novaSmjestJedLabel">Nova smještajna jedinica</h5>
	        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
	          <span aria-hidden="true">&times;</span>
	        </button>
	      </div>
	      <div class="modal-body">
	      	<form onsubmit = "return preSubmitModal()" class="col" action="#" th:action="@{/dodaj/smjestajnaJedinica}" th:object="${novaSmjestJed}"  method="post">

			<div class="row form-group">
		 		<div class="col">
			    	<label for="naz">Naziv</label>
			    	<input required type="text" class="form-control" id="naz" th:field="*{nazSmjestJed}">
		 		</div>
		 	</div>
			<div class="row form-group">
				<div class="col">
					<label for="tip">Tip smještajne jedinice</label>
			    	<select required class="form-control" id="tip" th:field="*{idTipSmjestJed}">
			    		<option th:each="tip : ${tipSmjestJedList}"
			    				th:value="${tip.idTipSmjestJed}" 
          						th:text="${tip.tipSmjestJed} +','+ ${tip.pogled} +','+ ${tip.kapacitetOd} + '-' + ${tip.kapacitetDo}">Tip,pogled,kapacitet</option>
			    	</select>
				</div>
		 	</div>
		 	<div class="row form-group">
				<div class="col">
					<label for="tip">Objekt</label>
			    	<select required class="form-control" id="tip" th:field="*{idObjekta}">
			    		<option th:each="objekt : ${objektList}"
			    				th:value="${objekt.idObjekta}" 
          						th:text="${objekt.nazObjekta}"></option>
			    	</select>
				</div>
		 	</div>
		 	<div class="row form-group">
		 		<div class="col">
			    	<label for="kat">Kat</label>
			    	<input required type="text" class="form-control" id="kat" th:field="*{kat}">
		 		</div>
		 	</div>
		 	
		 	<button type="submit" class="dodajKlasa btn btn-primary">Dodaj smještajnu jedinicu</button>
		 	<button type="button" class="btn btn-secondary" data-dismiss="modal">Odustani</button>
			<br></br>
		 	<div class="buttonTextId"></div>
			</form>
	      </div>
	    </div>
	  </div>
	</div>
   
	
</div> 

</body>
</html>
